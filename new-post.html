<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/new-post.css">
    <script type="module" src="scripts/new-post.js"></script>
</head>

<body class="new-post-page">
    <nav class="top-nav">
        <div class="nav-container">
            <a class="nav-logo" href="feed.html"><img src="chirp-logo.png" alt="Chirp" class="nav-logo-img">Chirp</a>
            <div class="nav-links">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <a href="feed.html">Feed</a>
                <a href="new-post.html" class="active">New post</a>
                <a href="profile.html">Profile</a>
                <a href="login.html">Log out</a>
            </div>
        </div>
    </nav>

    <main class="container composer-layout">
        <section class="card composer-card">
            <header class="composer-header">
                <h2>Create a New Post</h2>
                <p>Share an update with your network.</p>
            </header>

            <form id="new-post-form" class="composer-form">
                <div class="field-group">
                    <label for="post-content">Post content</label>
                    <textarea
                        id="post-content"
                        class="input-field"
                        rows="7"
                        maxlength="500"
                        placeholder="What do you want to share?"
                    ></textarea>
                </div>

                <div class="action-row">
                    <button type="submit" id="publish-btn" class="btn">Publish Post</button>
                    <a href="feed.html" class="btn cancel-btn">Cancel</a>
                </div>
            </form>

            <p id="new-post-message" class="status-text" aria-live="polite"></p>
        </section>
    </main>
    <script src="scripts/theme-toggle.js"></script>
</body>

</html>
