<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/profile.css">
    <script type="module" src="scripts/profile.js"></script>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a class="nav-logo" href="feed.html"><img src="chirp-logo.png" alt="Chirp" class="nav-logo-img">Chirp</a>
            <div class="nav-links">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <a href="feed.html">Feed</a>
                <a href="new-post.html">New post</a>
                <a href="profile.html" class="active">Profile</a>
                <a id="logout" href="login.html">Log out</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="card profile-card">
            <div class="cover"></div>
            <div class="profile-body">
                <div class="avatar-row">
                    <div class="avatar" id="pfpText">{}</div>
                    <div class="profile-actions">
                        <button type="button" class="btn btn-primary" id="editProfileBtn">Edit profile</button>
                        <a class="btn btn-secondary" href="feed.html">View feed</a>
                    </div>
                </div>

                <div id="editModal" class="modal" hidden>
                    <div class="modal-content">
                        <h3>Edit profile</h3>
                        <form id="editProfileForm">
                            <label for="editUsername">Username</label>
                            <input type="text" id="editUsername" required minlength="1">
                            <label for="editBio">Bio</label>
                            <textarea id="editBio" rows="3"></textarea>
                            <div class="modal-actions">
                                <button type="submit" class="btn btn-primary">Save</button>
                                <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="profile-info">
                    <h1 id="username">{username}</h1>
                    <p id="userid">{userid}</p>
                    <p class="email" id="email">{email}</p>
                </div>

                <div class="bio">
                    <p id="bio">{bio}</p>
                </div>


                <div class="stats">
                    <div class="stat">
                        <p id="followersCount">{followersCount}</p>
                        <span>Followers</span>
                    </div>
                    <div class="stat">
                        <p id="followingCount">{followingCount}</p>
                        <span>Following</span>
                    </div>
                    <div class="stat">
                        <p id="postsCount">{postsCount}</p>
                        <span>Posts</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="scripts/theme-toggle.js"></script>
</body>

</html>
