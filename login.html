<!DOCTYPE html>
<html lang="en">
<link href="styles/login.css" rel="stylesheet" />
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
</head>

<body>
    <div class="page">
        <div class="left-side">
            <h1>Sign in to your platform</h1>
            <p>Log in with your account to view and post on the social feed page created for this project.</p>
        </div>

        <div class="box">
            <div class="badge">Login</div>
            <h2>Sign in</h2>
            <form action="feed.html" method="get">
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email">
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password">
                </div>

                <button type="submit">Login</button>
            </form>
            <p>If you don't have an account, <a href="register.html">register here</a>.</p>
        </div>
    </div>
</body>

</html>
