<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>
    <main class="page container">
        <div class="left-side">
            <h1>Create your account</h1>
            <p>Register to start posting and using the social feed.</p>
        </div>

        <section class="card">
            <div class="badge">Register</div>
            <h2>Sign up</h2>

            <form id="register-form">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" class="input-field" required
                        placeholder="your name">
                </div>

                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" class="input-field" required
                        placeholder="you@example.com">
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" class="input-field" required
                        minlength="6" placeholder="at least 6 characters">
                </div>

                <button type="submit" class="btn">Create account</button>
            </form>

            <p id="register-message" class="message" ></p>

            <p class="small-text">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </section>
    </main>
</body>

</html>
